<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Froge Rive Reference</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #050505;
      display: grid;
      place-items: center;
    }

    canvas {
      width: 256px;
      height: 256px;
    }
  </style>
</head>
<body>
  <canvas id="rive" width="512" height="512" aria-label="Original Rive frog animation reference"></canvas>
  <script src="https://unpkg.com/@rive-app/canvas@2.37.5"></script>
  <script>
    window.addEventListener("load", () => {
      new rive.Rive({
        src: "./froge-loop.riv",
        canvas: document.getElementById("rive"),
        autoplay: true,
      });
    });
  </script>
</body>
</html>
