<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Froge Fly Catch</title>
  <style>
    @font-face {
      font-family: "OpenAI Sans";
      src: url("assets/fonts/OpenAISans-Regular.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "OpenAI Sans";
      src: url("assets/fonts/OpenAISans-Medium.otf") format("opentype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "OpenAI Sans";
      src: url("assets/fonts/OpenAISans-Semibold.otf") format("opentype");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "OpenAI Sans";
      src: url("assets/fonts/OpenAISans-Bold.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #000;
      --fg: #7a7a7a;
      --frog: #63ef42;
      --fly: #44a6ff;
      --tongue: #63ef42;
      --blue: #3298ff;
      --text: #eeeeec;
      --muted: #85868c;
      --chrome: #0c0c0d;
      --chrome-top: #151516;
      --chrome-line: #252527;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: "OpenAI Sans", ui-sans-serif, system-ui, sans-serif;
      overflow: hidden;
    }

    main {
      width: 100vw;
      height: 100vh;
      padding: 0;
    }

    .stage {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 30%, rgb(70 239 58 / 0.035), transparent 28%),
        #000;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #game {
      cursor: crosshair;
      touch-action: none;
      outline: none;
    }

    .footer-ui {
      position: fixed;
      left: clamp(24px, 3vw, 44px);
      right: clamp(24px, 3vw, 44px);
      bottom: clamp(12px, 1.8vh, 18px);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: clamp(12px, 1.05vw, 15px);
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: 0;
      pointer-events: none;
      user-select: none;
    }

    .footer-ui a {
      white-space: nowrap;
    }

    .footer-controls {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .footer-ui a {
      color: var(--muted);
      text-decoration: none;
      pointer-events: auto;
    }

    .footer-ui a:hover {
      color: var(--text);
    }

    .footer-ui .accent {
      color: var(--blue);
    }

    .footer-links {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .footer-ui {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
      }
    }

    @media (max-width: 760px) {
      canvas {
        width: 100vw;
        height: 100vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="stage">
      <canvas id="game" width="1536" height="900" tabindex="0" aria-label="ASCII frog fly catching game"></canvas>
    </div>
    <div class="footer-ui" aria-label="game links and controls">
      <span class="footer-controls">click anywhere to catch · press <span class="accent">r</span> to reset</span>
      <span class="footer-links">
        <a href="https://x.com/jskoiz" target="_blank" rel="noopener noreferrer">by <span class="accent">@jskoiz</span></a>
        <a href="#github">github</a>
      </span>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const footer = document.querySelector(".footer-ui");

    const VIRTUAL = { width: 1536, height: 900 };
    const viewport = {
      width: VIRTUAL.width,
      height: VIRTUAL.height,
      virtualHeight: VIRTUAL.height,
      dpr: 1,
      scale: 1,
      offsetX: 0,
      offsetY: 0,
      footerReserve: 70,
    };

    const COLORS = {
      bg: "#000000",
      frog: "#63ef42",
      fly: "#44a6ff",
      tongue: "#63ef42",
      text: "#eeeeec",
      muted: "#85868c",
      blue: "#3298ff",
    };

    const sprites = {
      frog: {
        image: new Image(),
        frameWidth: 360,
        frameHeight: 220,
        frames: 24,
        mouthOffset: { x: 190, y: 103 },
        scale: 1.05,
        attackFrame: 5,
      },
      fly: {
        image: new Image(),
        frameWidth: 150,
        frameHeight: 90,
        frames: 2,
        scale: 0.82,
      },
    };

    sprites.frog.image.src = "sprites/frog_sheet.png";
    sprites.fly.image.src = "sprites/fly_sheet.png";

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      viewport.width = Math.max(1, rect.width);
      viewport.height = Math.max(1, rect.height);
      viewport.dpr = Math.min(2, window.devicePixelRatio || 1);
      viewport.scale = viewport.width / VIRTUAL.width;
      viewport.virtualHeight = Math.max(
        VIRTUAL.height,
        viewport.height / viewport.scale
      );
      viewport.offsetX = 0;
      viewport.offsetY = 0;
      const footerRect = footer.getBoundingClientRect();
      const footerStyles = getComputedStyle(footer);
      const footerBottom = parseFloat(footerStyles.bottom) || 0;
      viewport.footerReserve = (footerRect.height + footerBottom + 52) / viewport.scale;

      const nextWidth = Math.round(viewport.width * viewport.dpr);
      const nextHeight = Math.round(viewport.height * viewport.dpr);
      if (canvas.width !== nextWidth || canvas.height !== nextHeight) {
        canvas.width = nextWidth;
        canvas.height = nextHeight;
      }

      if (state) {
        state.frog.x = FROG_HOME.x;
        state.frog.y = frogHomeY();
      }
    }

    function applyGameTransform() {
      const s = viewport.scale * viewport.dpr;
      ctx.setTransform(
        s,
        0,
        0,
        s,
        viewport.offsetX * viewport.dpr,
        viewport.offsetY * viewport.dpr
      );
    }

    const FROG_HOME = { x: 768 };
    const grassClusters = [120, 345, 640, 895, 1110, 1385];
    const fireflies = [
      { x: 290, y: 300 }, { x: 520, y: 210 }, { x: 1130, y: 230 },
      { x: 1335, y: 155 }, { x: 1260, y: 380 }, { x: 1015, y: 575 },
      { x: 315, y: 620 }, { x: 560, y: 470 },
    ];

    const state = {
      score: 0,
      frog: { x: FROG_HOME.x, y: 676 },
      flies: [],
      tongue: null,
      last: performance.now(),
      spawnTimer: 0,
    };

    function reset() {
      state.score = 0;
      state.frog.x = FROG_HOME.x;
      state.frog.y = frogHomeY();
      state.flies = [];
      state.tongue = null;
      state.spawnTimer = 0;
      for (let i = 0; i < 1; i++) spawnFly();
    }

    function groundY() {
      return viewport.virtualHeight - Math.max(44, viewport.footerReserve);
    }

    function frogHomeY() {
      return groundY() - 166;
    }

    function spawnFly() {
      state.flies.push({
        x: 420 + Math.random() * 700,
        y: 145 + Math.random() * 90,
        vx: (Math.random() < 0.5 ? -1 : 1) * (18 + Math.random() * 20),
        bob: Math.random() * Math.PI * 2,
        phase: Math.floor(Math.random() * sprites.fly.frames),
      });
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((event.clientX - rect.left - viewport.offsetX) / viewport.scale),
        y: ((event.clientY - rect.top - viewport.offsetY) / viewport.scale),
      };
    }

    function fireTongue(point = null) {
      if (state.tongue) return;
      const mouth = { x: state.frog.x, y: state.frog.y - 68 };
      let target = null;
      let best = Infinity;

      for (const fly of state.flies) {
        const dx = fly.x - mouth.x;
        const dy = fly.y - mouth.y;
        const dist = Math.hypot(dx, dy);
        const aimBonus = point ? Math.hypot(fly.x - point.x, fly.y - point.y) : 0;
        const score = dist + aimBonus * 1.8;
        if (dy < 80 && score < best && dist < 860 && (!point || aimBonus < 78)) {
          best = score;
          target = fly;
        }
      }

      state.tongue = {
        t: 0,
        duration: 0.24,
        from: mouth,
        to: target ? { x: target.x, y: target.y } : point || { x: mouth.x, y: mouth.y - 360 },
        target,
      };
    }

    function update(dt) {
      for (const fly of state.flies) {
        fly.x += fly.vx * dt;
        fly.bob += dt * 5;
        fly.y += Math.sin(fly.bob) * 0.45;
        if (fly.x < 290 || fly.x > 1246) fly.vx *= -1;
      }

      state.spawnTimer += dt;
      if (state.spawnTimer > 2.4 && state.flies.length < 1) {
        state.spawnTimer = 0;
        spawnFly();
      }

      if (state.tongue) {
        state.tongue.t += dt;
        if (state.tongue.t > state.tongue.duration) {
          if (state.tongue.target) {
            state.flies = state.flies.filter((fly) => fly !== state.tongue.target);
            state.score += 1;
            spawnFly();
          }
          state.tongue = null;
        }
      }
    }

    function drawFrog(now) {
      const sprite = sprites.frog;
      if (!sprite.image.complete) return;
      const frame = state.tongue
        ? sprite.attackFrame
        : Math.floor(now / 130) % sprite.frames;
      const dw = sprite.frameWidth * sprite.scale;
      const dh = sprite.frameHeight * sprite.scale;
      const dx = state.frog.x - sprite.mouthOffset.x * sprite.scale;
      const dy = state.frog.y - sprite.mouthOffset.y * sprite.scale;
      ctx.drawImage(
        sprite.image,
        frame * sprite.frameWidth,
        0,
        sprite.frameWidth,
        sprite.frameHeight,
        dx,
        dy,
        dw,
        dh
      );
    }

    function drawFly(fly, now) {
      const sprite = sprites.fly;
      if (!sprite.image.complete) return;
      const frame = (Math.floor(now / 110) + fly.phase) % sprite.frames;
      const dw = sprite.frameWidth * sprite.scale;
      const dh = sprite.frameHeight * sprite.scale;
      ctx.drawImage(
        sprite.image,
        frame * sprite.frameWidth,
        0,
        sprite.frameWidth,
        sprite.frameHeight,
        fly.x - dw / 2,
        fly.y - dh / 2,
        dw,
        dh
      );
    }

    function drawTongue() {
      if (!state.tongue) return;
      const { from, to, t, duration } = state.tongue;
      const p = Math.min(1, t / duration);
      const tip = {
        x: from.x + (to.x - from.x) * Math.sin(p * Math.PI),
        y: from.y + (to.y - from.y) * Math.sin(p * Math.PI),
      };
      ctx.save();
      ctx.strokeStyle = COLORS.tongue;
      ctx.fillStyle = COLORS.tongue;
      ctx.lineWidth = 4;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(tip.x, tip.y);
      ctx.stroke();
      ctx.font = "30px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("*", tip.x, tip.y);
      ctx.restore();
    }

    function openAISans(weight, size) {
      return `${weight} ${size}px "OpenAI Sans", ui-sans-serif, system-ui, sans-serif`;
    }

    function mono(weight, size) {
      return `${weight} ${size}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace`;
    }

    function drawInlineText(parts, x, y, options = {}) {
      ctx.save();
      ctx.font = options.font || openAISans(600, 32);
      ctx.textAlign = "left";
      ctx.textBaseline = options.baseline || "top";
      let cursor = x;
      for (const part of parts) {
        ctx.fillStyle = part.color;
        ctx.fillText(part.text, cursor, y);
        cursor += ctx.measureText(part.text).width;
      }
      ctx.restore();
      return cursor;
    }

    function measureInlineText(parts, font) {
      ctx.save();
      ctx.font = font;
      const width = parts.reduce((sum, part) => sum + ctx.measureText(part.text).width, 0);
      ctx.restore();
      return width;
    }

    function drawText() {
      const score = String(state.score).padStart(2, "0");
      const scoreFont = openAISans(500, 18);
      const helperFont = openAISans(500, 16);
      drawInlineText([
        { text: "score ", color: COLORS.muted },
        { text: score, color: COLORS.blue },
      ], 44, 48, { font: scoreFont });

      drawInlineText([
        { text: "_", color: COLORS.blue },
      ], 44, 82, { font: mono(700, 18) });

    }

    function drawMonoText(text, x, y, options = {}) {
      ctx.save();
      ctx.font = mono(options.weight || 700, options.size || 32);
      ctx.textAlign = options.align || "center";
      ctx.textBaseline = options.baseline || "middle";
      ctx.fillStyle = options.color || COLORS.frog;
      ctx.globalAlpha = options.alpha ?? 1;
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawGround() {
      ctx.save();
      ctx.fillStyle = COLORS.frog;
      ctx.globalAlpha = 0.82;
      for (let x = 44; x < VIRTUAL.width - 40; x += 16) {
        ctx.beginPath();
        ctx.arc(x, groundY(), 1.8, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;
      ctx.font = mono(700, 32);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (const x of grassClusters) {
        ctx.fillText("^^^^", x, groundY() - 24);
      }
      ctx.restore();
    }

    function drawFireflies(now) {
      ctx.save();
      ctx.fillStyle = COLORS.frog;
      ctx.font = mono(700, 18);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (let i = 0; i < fireflies.length; i++) {
        const mote = fireflies[i];
        const alpha = 0.45 + Math.sin(now / 520 + i) * 0.25;
        ctx.globalAlpha = Math.max(0.18, alpha);
        ctx.fillText("..", mote.x, mote.y);
      }
      ctx.restore();
    }

    function draw(now) {
      resizeCanvas();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      applyGameTransform();
      ctx.clearRect(0, 0, VIRTUAL.width, viewport.virtualHeight);
      drawText();
      drawFireflies(now);
      drawGround();

      for (const fly of state.flies) {
        drawFly(fly, now);
      }

      drawTongue();
      drawFrog(now);
    }

    function frame(now) {
      const dt = Math.min(0.033, (now - state.last) / 1000);
      state.last = now;
      update(dt);
      draw(now);
      requestAnimationFrame(frame);
    }

    addEventListener("keydown", (event) => {
      if (event.key === " ") {
        event.preventDefault();
        fireTongue();
      }
      if (event.key.toLowerCase() === "r") {
        event.preventDefault();
        reset();
      }
    });

    canvas.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      canvas.focus();
      const point = canvasPoint(event);
      fireTongue(point);
    });

    reset();
    resizeCanvas();
    addEventListener("resize", resizeCanvas);
    requestAnimationFrame(frame);
  </script>
</body>
</html>
