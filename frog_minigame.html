<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Froge Fly Catch</title>
  <style>
    :root {
      --bg: #050505;
      --fg: #f6f6f0;
      --frog: #54CA31;
      --fly: #328FF2;
      --tongue: #ff8a24;
      --panel: #171717;
      --line: #333333;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    main {
      width: min(100vw, 720px);
      padding: 20px;
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .stage {
      position: relative;
      width: min(92vw, 512px);
      aspect-ratio: 1;
      border: 1px solid var(--line);
      background: var(--bg);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #game {
      cursor: crosshair;
      touch-action: none;
    }

    .hud {
      width: min(92vw, 512px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #242424;
      color: var(--fg);
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
    }

    button:hover { background: #2d2d2d; }
  </style>
</head>
<body>
  <main>
    <div class="stage">
      <canvas id="game" width="512" height="512" tabindex="0" aria-label="ASCII frog fly catching game"></canvas>
    </div>
    <div class="hud">
      <span id="score">score 0</span>
      <span>click/tap canvas to shoot · space shoots up</span>
      <button id="restart" type="button">restart</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const restart = document.getElementById("restart");

    const COLORS = {
      bg: "#050505",
      frog: "#54CA31",
      fly: "#328FF2",
      tongue: "#ff8a24",
      text: "#f6f6f0",
    };

    const sprites = {
      frog: {
        image: new Image(),
        frameWidth: 360,
        frameHeight: 220,
        frames: 24,
        mouthOffset: { x: 190, y: 103 },
        scale: 0.6,
        attackFrame: 5,
      },
      fly: {
        image: new Image(),
        frameWidth: 150,
        frameHeight: 90,
        frames: 2,
        scale: 0.48,
      },
    };

    sprites.frog.image.src = "sprites/frog_sheet.png";
    sprites.fly.image.src = "sprites/fly_sheet.png";

    const FROG_HOME = { x: 256, y: 430 };
    const state = {
      score: 0,
      frog: { ...FROG_HOME },
      flies: [],
      tongue: null,
      last: performance.now(),
      spawnTimer: 0,
    };

    function reset() {
      state.score = 0;
      state.frog.x = FROG_HOME.x;
      state.frog.y = FROG_HOME.y;
      state.flies = [];
      state.tongue = null;
      state.spawnTimer = 0;
      scoreEl.textContent = "score 0";
      for (let i = 0; i < 4; i++) spawnFly();
    }

    function spawnFly() {
      state.flies.push({
        x: 80 + Math.random() * 352,
        y: 56 + Math.random() * 186,
        vx: (Math.random() < 0.5 ? -1 : 1) * (28 + Math.random() * 34),
        bob: Math.random() * Math.PI * 2,
        phase: Math.floor(Math.random() * sprites.fly.frames),
      });
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((event.clientX - rect.left) / rect.width) * canvas.width,
        y: ((event.clientY - rect.top) / rect.height) * canvas.height,
      };
    }

    function fireTongue(point = null) {
      if (state.tongue) return;
      const mouth = { x: state.frog.x, y: state.frog.y - 32 };
      let target = null;
      let best = Infinity;

      for (const fly of state.flies) {
        const dx = fly.x - mouth.x;
        const dy = fly.y - mouth.y;
        const dist = Math.hypot(dx, dy);
        const aimBonus = point ? Math.hypot(fly.x - point.x, fly.y - point.y) : 0;
        const score = dist + aimBonus * 1.8;
        if (dy < 40 && score < best && dist < 440 && (!point || aimBonus < 62)) {
          best = score;
          target = fly;
        }
      }

      state.tongue = {
        t: 0,
        duration: 0.24,
        from: mouth,
        to: target ? { x: target.x, y: target.y } : point || { x: mouth.x, y: mouth.y - 150 },
        target,
      };
    }

    function update(dt) {
      for (const fly of state.flies) {
        fly.x += fly.vx * dt;
        fly.bob += dt * 5;
        fly.y += Math.sin(fly.bob) * 0.45;
        if (fly.x < 42 || fly.x > 470) fly.vx *= -1;
      }

      state.spawnTimer += dt;
      if (state.spawnTimer > 1.8 && state.flies.length < 7) {
        state.spawnTimer = 0;
        spawnFly();
      }

      if (state.tongue) {
        state.tongue.t += dt;
        if (state.tongue.t > state.tongue.duration) {
          if (state.tongue.target) {
            state.flies = state.flies.filter((fly) => fly !== state.tongue.target);
            state.score += 1;
            scoreEl.textContent = `score ${state.score}`;
            spawnFly();
          }
          state.tongue = null;
        }
      }
    }

    function drawFrog(now) {
      const sprite = sprites.frog;
      if (!sprite.image.complete) return;
      const frame = state.tongue
        ? sprite.attackFrame
        : Math.floor(now / 130) % sprite.frames;
      const dw = sprite.frameWidth * sprite.scale;
      const dh = sprite.frameHeight * sprite.scale;
      const dx = state.frog.x - sprite.mouthOffset.x * sprite.scale;
      const dy = state.frog.y - sprite.mouthOffset.y * sprite.scale;
      ctx.drawImage(
        sprite.image,
        frame * sprite.frameWidth,
        0,
        sprite.frameWidth,
        sprite.frameHeight,
        dx,
        dy,
        dw,
        dh
      );
    }

    function drawFly(fly, now) {
      const sprite = sprites.fly;
      if (!sprite.image.complete) return;
      const frame = (Math.floor(now / 110) + fly.phase) % sprite.frames;
      const dw = sprite.frameWidth * sprite.scale;
      const dh = sprite.frameHeight * sprite.scale;
      ctx.drawImage(
        sprite.image,
        frame * sprite.frameWidth,
        0,
        sprite.frameWidth,
        sprite.frameHeight,
        fly.x - dw / 2,
        fly.y - dh / 2,
        dw,
        dh
      );
    }

    function drawTongue() {
      if (!state.tongue) return;
      const { from, to, t, duration } = state.tongue;
      const p = Math.min(1, t / duration);
      const tip = {
        x: from.x + (to.x - from.x) * Math.sin(p * Math.PI),
        y: from.y + (to.y - from.y) * Math.sin(p * Math.PI),
      };
      ctx.save();
      ctx.strokeStyle = COLORS.tongue;
      ctx.fillStyle = COLORS.tongue;
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(tip.x, tip.y);
      ctx.stroke();
      ctx.font = "24px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("*", tip.x, tip.y);
      ctx.restore();
    }

    function draw(now) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const fly of state.flies) {
        drawFly(fly, now);
      }

      drawTongue();
      drawFrog(now);
    }

    function frame(now) {
      const dt = Math.min(0.033, (now - state.last) / 1000);
      state.last = now;
      update(dt);
      draw(now);
      requestAnimationFrame(frame);
    }

    addEventListener("keydown", (event) => {
      if (event.key === " ") {
        event.preventDefault();
        fireTongue();
      }
    });

    canvas.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      canvas.focus();
      const point = canvasPoint(event);
      fireTongue(point);
    });

    restart.addEventListener("click", reset);

    reset();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
